<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Age check</h1>
    </header>
    <section>
        <div>
            <p>
                <label for="txtyear">What's your birth year?</label>
                <input type="number" name="birthyear" id="birthyear" max="2027">  
            </p>
            <p>
                <label for="radiogender">Are you:</label>
                <input type="radio" name="radiogender" id="rmale" checked>
                <label for="radiogender">Male</label>
                <input type="radio" name="radiogender" id="female">
                <label for="radiogender">Female</label>
            </p>
            <p>
                <input type="button" value="Check" onclick="AgeCheck()">
            </p>
        </div>
        <div id="result">
            
        </div>
    </section>
    <footer>
        <p>&copy;SalosP_</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
